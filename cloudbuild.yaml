steps:
  - name: node:22-alpine
    entrypoint: sh
    args:
      - -c
      - corepack enable && corepack prepare pnpm@latest --activate && pnpm install --frozen-lockfile && pnpm build && pnpm test

  - name: gcr.io/kaniko-project/executor:latest
    args:
      - --dockerfile=Dockerfile
      - --destination=$_IMAGE
      - --cache=true
      - --cache-ttl=168h
      - --compressed-caching=false
      - --snapshot-mode=redo

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - app-store-mcp
      - --image=$_IMAGE
      - --region=$_REGION
      - --allow-unauthenticated
      - --port=8080
      - --memory=256Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=3
      - --set-env-vars=MCP_TRANSPORT=httpStream,PORT=8080,NODE_ENV=production

substitutions:
  _REGION: us-central1
  _IMAGE: us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/app-store-mcp:$BUILD_ID

options:
  logging: CLOUD_LOGGING_ONLY
